<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kerr Accretion Disk — a = 0.998 M</title>
    <link rel="stylesheet" href="src/style.css" />
    <style>
      /* ── Kerr physics panel ── */
      #spin-panel {
        position: absolute;
        bottom: 1.4rem;
        right: 1.4rem;
        background: rgba(0, 0, 0, 0.62);
        border: 1px solid rgba(255, 200, 80, 0.25);
        border-radius: 8px;
        padding: 0.7rem 1rem;
        font-family: 'Courier New', monospace;
        font-size: 0.72rem;
        color: rgba(255, 220, 120, 0.92);
        line-height: 1.7;
        min-width: 200px;
        backdrop-filter: blur(4px);
      }
      #spin-panel .panel-title {
        font-size: 0.78rem;
        font-weight: bold;
        color: rgba(255, 200, 80, 1.0);
        margin-bottom: 0.4rem;
        letter-spacing: 0.05em;
      }
      #spin-panel label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        color: rgba(255, 230, 160, 0.85);
      }
      #spin-panel input[type="range"] {
        flex: 1;
        accent-color: #ffcc44;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <!-- HUD: top-left title strip -->
    <div id="hud">
      <div class="title">Kerr Accretion Disk</div>
      <div class="subtitle">
        Boyer–Lindquist Geodesics &nbsp;·&nbsp;
        <span id="hud-isco">r<sub>ISCO</sub> = —</span>
      </div>
      <div class="controls">Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>
    </div>

    <!-- Physics readout panel: bottom-right -->
    <div id="spin-panel">
      <div class="panel-title">Kerr Parameters</div>
      <div id="hud-spin">a = 0.998 M</div>
      <div id="hud-horizon">r₊ = — M</div>
      <div id="hud-ergosphere">r_erg(eq) = 2.00 M</div>
      <div id="hud-omega-h">Ω_H = — M⁻¹</div>
      <label>
        Spin
        <input id="spin-slider" type="range" min="0.0" max="0.998" step="0.001" value="0.998" />
      </label>
    </div>

    <script type="module" src="src/kerr.js"></script>
  </body>
</html>
