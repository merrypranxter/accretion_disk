<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravitational Lensing — Schwarzschild Black Hole</title>
    <link rel="stylesheet" href="src/style.css" />
    <style>
      /* ── Inclination slider panel ── */
      #incl-panel {
        position: absolute;
        bottom: 1.4rem;
        right: 1.4rem;
        background: rgba(0, 0, 0, 0.62);
        border: 1px solid rgba(100, 180, 255, 0.25);
        border-radius: 8px;
        padding: 0.7rem 1rem;
        font-family: 'Courier New', monospace;
        font-size: 0.72rem;
        color: rgba(140, 210, 255, 0.92);
        line-height: 1.8;
        min-width: 200px;
        backdrop-filter: blur(4px);
      }
      #incl-panel .panel-title {
        font-size: 0.78rem;
        font-weight: bold;
        color: rgba(140, 210, 255, 1.0);
        margin-bottom: 0.4rem;
        letter-spacing: 0.05em;
      }
      #incl-panel label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        color: rgba(180, 225, 255, 0.85);
      }
      #incl-panel input[type="range"] {
        flex: 1;
        accent-color: #66aaff;
        cursor: pointer;
      }
      /* Legend for winding-number colours */
      #legend {
        position: absolute;
        top: 1.4rem;
        right: 1.4rem;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(100, 180, 255, 0.18);
        border-radius: 8px;
        padding: 0.6rem 0.9rem;
        font-family: 'Courier New', monospace;
        font-size: 0.68rem;
        color: rgba(200, 230, 255, 0.85);
        line-height: 1.9;
        backdrop-filter: blur(4px);
      }
      #legend .leg-title {
        font-size: 0.73rem;
        font-weight: bold;
        color: rgba(200, 230, 255, 1.0);
        margin-bottom: 0.3rem;
      }
      .swatch {
        display: inline-block;
        width: 0.75em;
        height: 0.75em;
        border-radius: 2px;
        margin-right: 0.3em;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <!-- HUD: top-left title strip -->
    <div id="hud">
      <div class="title">Gravitational Lensing</div>
      <div class="subtitle">
        Schwarzschild Black Hole &nbsp;·&nbsp;
        b<sub>crit</sub> = 3√3 M ≈ 5.196 M
      </div>
      <div class="controls">Adjust inclination with slider</div>
    </div>

    <!-- Winding-number legend: top-right -->
    <div id="legend">
      <div class="leg-title">Image Order</div>
      <div><span class="swatch" style="background:#ffcc1a;"></span> Primary image (n = 0)</div>
      <div><span class="swatch" style="background:#1adae6;"></span> 1st relativistic (n = 1)</div>
      <div><span class="swatch" style="background:#e625cc;"></span> 2nd relativistic (n = 2)</div>
      <div><span class="swatch" style="background:#ffffff;"></span> Higher order (n ≥ 3)</div>
      <div style="margin-top:0.4em; color:rgba(140,200,255,0.7);">
        Einstein ring at b = b<sub>E</sub>
      </div>
    </div>

    <!-- Inclination control: bottom-right -->
    <div id="incl-panel">
      <div class="panel-title">Observer Inclination</div>
      <div>
        θ<sub>inc</sub> = <span id="incl-label">0°</span>
        <span style="color:rgba(140,200,255,0.55); margin-left:0.5rem;">
          (0° = face-on, 90° = edge-on)
        </span>
      </div>
      <label>
        Inclination
        <input id="incl-slider" type="range"
               min="0" max="89" step="1" value="0" />
      </label>
    </div>

    <script type="module" src="src/lensing.js"></script>
  </body>
</html>
